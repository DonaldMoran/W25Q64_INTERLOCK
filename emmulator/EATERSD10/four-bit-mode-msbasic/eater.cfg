MEMORY {
  ZP:           start = $0000, size = $0100, type = rw;
  INPUT_BUFFER: start = $0300, size = $0100, type = rw, file = "";
  BASROM:       start = $8000, size = $7000, fill = yes, file = %O;
  # ROM for Krusader code
  KRUSADER:     start = $F000, size = $0F00, fill = yes, file = %O;
  # ROM for Wozniak Monitor
  WOZMON:       start = $FF00, size = $FA,   fill = yes, file = %O;
  # ROM for Reset Vectors
  RESETVEC:     start = $FFFA, size = 6,     fill = yes, file = %O;
  DUMMY:        start = $0000, size = $00FF, file = "";
}

SEGMENTS {
  ZEROPAGE:     load = ZP, type = zp;
  INPUT_BUFFER: load = INPUT_BUFFER, type = rw;
  HEADER:       load = BASROM,	type = ro;
  VECTORS:      load = BASROM,	type = ro;
  KEYWORDS:     load = BASROM,	type = ro;
  ERROR:        load = BASROM,	type = ro;
  CODE:	        load = BASROM,	type = ro;
  CHRGET:       load = BASROM,	type = ro;
  INIT:	        load = BASROM,	type = ro;
  EXTRA:        load = BASROM,	type = ro;
  DUMMY:        load = DUMMY; # don't include

  BIOS:         load = BASROM, type = ro;
  
  # A KRUSADER segment is defined as requested, for future use.
  # To use it, add `.segment "KRUSADER"` to the assembly source.
  KRUSADER:     load = KRUSADER, type = ro, start = $F000;

  # The WOZMON code from the assembly file will be placed here due to `.ORG $FF00`.
  WOZMON:       load = WOZMON,   type = ro, start = $FF00;
  OUTHEX:       load = WOZMON,   type = ro, start = $FFDC;
  
  RESETVEC:     load = RESETVEC, type = ro, start = $FFFA;
}

